name: Weekly Snapshot

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Create weekly snapshot
        env:
          SCP_USER: ${{ secrets.SCP_USER }}
          SCP_PASS: ${{ secrets.SCP_PASS }}
          SERVER_ID: "652141"
        run: |
          set -euo pipefail
          WEEK="kw$(date +%V)"
          API="https://www.servercontrolpanel.de/scp-core/api/v1/servers/$SERVER_ID"
          
          TOKEN=$(curl -sf -X POST 'https://servercontrolpanel.de/realms/scp/protocol/openid-connect/token' \
            -d "client_id=scp&username=$SCP_USER&password=$SCP_PASS&grant_type=password" | jq -r '.access_token')
          echo "✓ Authenticated"
          
          STATE=$(curl -sf "$API" -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json" | jq -r '.serverLiveInfo.state')
          echo "Server state: $STATE"
          
          if [ "$STATE" != "OFF" ] && [ "$STATE" != "SHUTOFF" ]; then
            echo "Stopping server..."
            curl -sf -X PATCH "$API" -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json" \
              -H "Content-Type: application/merge-patch+json" -d '{"state":"OFF"}' > /dev/null
            
            for i in {1..30}; do
              sleep 10
              STATE=$(curl -sf "$API" -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json" | jq -r '.serverLiveInfo.state')
              [ "$STATE" = "OFF" ] || [ "$STATE" = "SHUTOFF" ] && break
            done
            echo "✓ Server stopped"
          fi
          
          echo "Creating snapshot: $WEEK"
          curl -sf -X POST "$API/snapshots" -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json" \
            -H "Content-Type: application/json" -d "{\"name\":\"$WEEK\",\"description\":\"Weekly backup\",\"diskName\":\"vda\",\"onlineSnapshot\":false}" > /dev/null
          echo "✓ Snapshot created"
          
          sleep 30
          
          echo "Starting server..."
          curl -sf -X PATCH "$API" -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json" \
            -H "Content-Type: application/merge-patch+json" -d '{"state":"ON"}' > /dev/null
          echo "✓ Server started"
