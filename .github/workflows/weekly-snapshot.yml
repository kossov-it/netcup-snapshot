name: Weekly Snapshot
on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Create offline snapshot
        env:
          SCP_USER: ${{ secrets.SCP_USER }}
          SCP_PASS: ${{ secrets.SCP_PASS }}
          SERVER_ID: "652141"
        run: |
          set -uo pipefail
          API="https://www.servercontrolpanel.de/scp-core/api/v1"
          NEEDS_RESTART=false
          TOKEN=""
          
          # Ensure server starts on ANY exit
          cleanup() {
            if $NEEDS_RESTART && [[ -n "$TOKEN" ]]; then
              echo "⚠ Cleanup: ensuring server is running..."
              for attempt in {1..3}; do
                curl -sf -X PATCH "$API/servers/$SERVER_ID" \
                  -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json" \
                  -H "Content-Type: application/merge-patch+json" -d '{"state":"ON"}' >/dev/null && break
                sleep 5
              done
              echo "✓ Server start command sent"
            fi
          }
          trap cleanup EXIT
          
          # Auth
          TOKEN=$(curl -sf -X POST 'https://servercontrolpanel.de/realms/scp/protocol/openid-connect/token' \
            -d "client_id=scp&username=$SCP_USER&password=$SCP_PASS&grant_type=password" | jq -r '.access_token')
          [[ -z "$TOKEN" || "$TOKEN" == "null" ]] && echo "✗ Auth failed" && exit 1
          AUTH=(-H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json")
          echo "✓ Authenticated"
          
          wait_task() {
            local uuid=$1 max=${2:-60}
            for ((i=1; i<=max; i++)); do
              state=$(curl -sf "$API/tasks/$uuid" "${AUTH[@]}" | jq -r '.state')
              case "$state" in
                FINISHED) return 0 ;;
                FAILED|CANCELLED) echo "Task $uuid: $state"; return 1 ;;
              esac
              sleep 10
            done
            echo "Task timeout"; return 1
          }
          
          # Check current state
          STATE=$(curl -sf "$API/servers/$SERVER_ID" "${AUTH[@]}" | jq -r '.serverLiveInfo.state')
          echo "Current state: $STATE"
          
          # Shutdown if running
          if [[ "$STATE" != "OFF" && "$STATE" != "SHUTOFF" ]]; then
            NEEDS_RESTART=true
            echo "Stopping server..."
            TASK=$(curl -sf -X PATCH "$API/servers/$SERVER_ID?stateOption=OFF:%20POWEROFF" "${AUTH[@]}" \
              -H "Content-Type: application/merge-patch+json" -d '{"state":"OFF"}' | jq -r '.uuid // empty')
            
            if [[ -n "$TASK" ]]; then
              wait_task "$TASK" 30 || true
            fi
            
            # Verify stopped
            for i in {1..30}; do
              STATE=$(curl -sf "$API/servers/$SERVER_ID" "${AUTH[@]}" | jq -r '.serverLiveInfo.state')
              [[ "$STATE" == "OFF" || "$STATE" == "SHUTOFF" ]] && break
              sleep 10
            done
            echo "✓ Server stopped"
          fi
          
          # Create snapshot
          SNAP="weekly-$(date -u +%Y%m%d-%H%M)"
          echo "Creating snapshot: $SNAP"
          RESULT=$(curl -sf -X POST "$API/servers/$SERVER_ID/snapshots" "${AUTH[@]}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$SNAP\",\"description\":\"Weekly backup\",\"diskName\":\"vda\",\"onlineSnapshot\":false}")
          
          TASK=$(echo "$RESULT" | jq -r '.uuid // empty')
          if [[ -z "$TASK" ]]; then
            echo "✗ Snapshot request failed: $RESULT"
            exit 1
          fi
          
          echo "Snapshot task: $TASK"
          if wait_task "$TASK" 120; then
            echo "✓ Snapshot created: $SNAP"
          else
            echo "✗ Snapshot task failed"
            exit 1
          fi
          
          # Explicit restart (trap handles failures)
          if $NEEDS_RESTART; then
            curl -sf -X PATCH "$API/servers/$SERVER_ID" "${AUTH[@]}" \
              -H "Content-Type: application/merge-patch+json" -d '{"state":"ON"}' >/dev/null
            NEEDS_RESTART=false  # Prevent trap from restarting again
            echo "✓ Server started"
          fi
