name: Weekly Snapshot

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: snapshot-${{ matrix.server_id }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        server_id: ${{ fromJson(vars.SERVER_IDS) }}

    steps:
      - name: Create offline snapshot
        env:
          SCP_USER: ${{ secrets.SCP_USER }}
          SCP_PASS: ${{ secrets.SCP_PASS }}
          SERVER_ID: ${{ matrix.server_id }}
        run: |
          set -euo pipefail

          # ── Configuration ──────────────────────────────────────────────
          readonly API_BASE="https://www.servercontrolpanel.de/scp-core/api/v1"
          readonly AUTH_URL="https://www.servercontrolpanel.de/realms/scp/protocol/openid-connect/token"
          readonly POLL_INTERVAL=5
          readonly POLL_ATTEMPTS=12              # ~60s: state polls + stop/start/delete tasks
          readonly SNAPSHOT_POLL_ATTEMPTS=30     # ~150s: snapshot creation
          readonly RESTART_MAX_ATTEMPTS=3
          readonly SNAPSHOT_RETENTION_DAYS=28

          WAS_ONLINE=false
          TOKEN=""

          echo "::group::Server $SERVER_ID"

          # ── Authentication ─────────────────────────────────────────────
          # Uses Keycloak password grant (the only flow netcup currently
          # exposes). Fields are URL-encoded so passwords with &, =, +, %,
          # # or spaces don't corrupt the body.
          refresh_token() {
            local response token
            response=$(curl -s --retry 3 --retry-delay 2 --retry-all-errors \
              -X POST "$AUTH_URL" \
              --data-urlencode "client_id=scp" \
              --data-urlencode "grant_type=password" \
              --data-urlencode "username=$SCP_USER" \
              --data-urlencode "password=$SCP_PASS")

            token=$(echo "$response" | jq -r '.access_token // empty' 2>/dev/null) || token=""

            if [[ -z "$token" ]]; then
              echo "::error title=Auth Failed::Authentication failed for server $SERVER_ID (check SCP_USER/SCP_PASS)" >&2
              return 1
            fi

            TOKEN="$token"
            echo "::add-mask::$TOKEN"
          }

          # ── API Helper ─────────────────────────────────────────────────
          # Returns response body on 2xx, returns 1 on any other status.
          # Extracts a single human-readable error line on failure (the
          # API uses {code, message} on errors) without dumping raw bodies.
          api() {
            local method=$1 endpoint=$2
            shift 2

            local response http_code
            response=$(curl -s --retry 2 --retry-delay 2 --retry-all-errors \
              -w "\n%{http_code}" \
              -X "$method" \
              "$API_BASE$endpoint" \
              -H "Authorization: Bearer $TOKEN" \
              "$@")

            http_code=$(echo "$response" | tail -n1)
            response=$(echo "$response" | sed '$d')

            if [[ ! "$http_code" =~ ^2[0-9]{2}$ ]]; then
              local msg
              msg=$(echo "$response" | jq -r '.message // .error_description // .error // empty' 2>/dev/null) || msg=""
              echo "::warning::API $method $endpoint -> HTTP $http_code${msg:+ ($msg)}" >&2
              return 1
            fi

            echo "$response"
          }

          # ── Wait for Task Completion ───────────────────────────────────
          # Task states per spec: PENDING, RUNNING (intermediate),
          # FINISHED (success), ERROR/CANCELED/WAITING_FOR_CANCEL/ROLLBACK
          # (failure). Anything else falls through and we keep polling.
          wait_task() {
            local uuid=$1 max_attempts=${2:-$POLL_ATTEMPTS}
            local state poll_failures=0

            for ((i = 1; i <= max_attempts; i++)); do
              state=$(api GET "/tasks/$uuid" 2>/dev/null | jq -r '.state // empty') || true

              case "$state" in
                FINISHED)
                  return 0
                  ;;
                ERROR|CANCELED|WAITING_FOR_CANCEL|ROLLBACK)
                  echo "::warning::Task $uuid ended with state: $state"
                  return 1
                  ;;
                "")
                  poll_failures=$((poll_failures + 1))
                  if ((poll_failures >= 3)); then
                    echo "::warning::Task $uuid state unavailable after $poll_failures consecutive polls"
                    return 1
                  fi
                  ;;
                *)
                  poll_failures=0
                  ;;
              esac
              sleep "$POLL_INTERVAL"
            done

            echo "::warning::Task $uuid timed out after $((max_attempts * POLL_INTERVAL))s (last state: ${state:-unknown})"
            return 1
          }

          # ── Wait for Server State ──────────────────────────────────────
          # serverLiveInfo.state enum:
          #   NOSTATE, RUNNING, BLOCKED, PAUSED, SHUTDOWN, SHUTOFF,
          #   CRASHED, PMSUSPENDED, DISK_SNAPSHOT
          # Note: "OFF" is the *write-side* PATCH value, NOT a read state.
          wait_for_state() {
            local target_states=("$@")
            local state last_state="unknown"

            for ((i = 1; i <= POLL_ATTEMPTS; i++)); do
              state=$(api GET "/servers/$SERVER_ID" 2>/dev/null | jq -r '.serverLiveInfo.state // empty') || true
              [[ -n "$state" ]] && last_state="$state"

              for target in "${target_states[@]}"; do
                if [[ "$state" == "$target" ]]; then
                  return 0
                fi
              done
              sleep "$POLL_INTERVAL"
            done

            echo "::warning::Server $SERVER_ID did not reach state(s) ${target_states[*]} (last seen: $last_state)"
            return 1
          }

          # ── Cleanup Old Snapshots ──────────────────────────────────────
          # Uses the API's authoritative creationTime, scoped to names that
          # match this script's naming pattern (current YYYYMMDD or the
          # initial-commit YYYY-MM-DD). User-managed snapshots with any
          # other name are preserved.
          cleanup_old_snapshots() {
            echo "Cleaning up snapshots older than ${SNAPSHOT_RETENTION_DAYS} days..."

            # Snapshot creation can run for minutes; refresh before listing
            # so the GET below doesn't hit an expired access token.
            refresh_token || {
              echo "::warning::Token refresh failed before cleanup; skipping"
              return 0
            }

            local cutoff_iso snapshots old_names
            cutoff_iso=$(date -u -d "-${SNAPSHOT_RETENTION_DAYS} days" +%Y-%m-%dT%H:%M:%SZ)

            snapshots=$(api GET "/servers/$SERVER_ID/snapshots") || {
              echo "::warning::Could not list snapshots for cleanup"
              return 0
            }

            old_names=$(echo "$snapshots" | jq -r --arg cutoff "$cutoff_iso" '
              .[]
              | select(.creationTime != null)
              | select(.creationTime < $cutoff)
              | select(.name | test("^([0-9]{8}|[0-9]{4}-[0-9]{2}-[0-9]{2})$"))
              | .name
            ')

            local deleted=0
            while IFS= read -r snap_name; do
              [[ -z "$snap_name" ]] && continue

              # Refresh before each delete - cleanup can outrun token TTL
              refresh_token || {
                echo "::warning::Token refresh failed during cleanup; aborting further deletes"
                break
              }

              echo "  Deleting old snapshot: $snap_name"
              local del_task
              del_task=$(api DELETE "/servers/$SERVER_ID/snapshots/$snap_name" | jq -r '.uuid // empty') || del_task=""

              if [[ -n "$del_task" ]] && wait_task "$del_task" "$POLL_ATTEMPTS"; then
                echo "  Deleted: $snap_name"
                deleted=$((deleted + 1))
              else
                echo "::warning::Failed to delete snapshot: $snap_name"
              fi
            done <<< "$old_names"

            echo "Cleanup complete ($deleted old snapshot(s) deleted)"
          }

          # ── Restart Server (called by trap on exit) ────────────────────
          # PATCH state=ON, wait for the task, then verify by polling the
          # live state. Retry the whole sequence on failure rather than
          # re-issuing PATCH while a previous start may still be running.
          restart_server() {
            $WAS_ONLINE || return 0

            echo "Restarting server $SERVER_ID..."

            refresh_token || echo "::warning::Token refresh failed during recovery; trying with existing token"

            local attempt task
            for ((attempt = 1; attempt <= RESTART_MAX_ATTEMPTS; attempt++)); do
              echo "  Restart attempt $attempt/$RESTART_MAX_ATTEMPTS"

              task=$(api PATCH "/servers/$SERVER_ID" \
                -H "Content-Type: application/merge-patch+json" \
                -d '{"state":"ON"}' | jq -r '.uuid // empty') || task=""

              if [[ -n "$task" ]]; then
                wait_task "$task" "$POLL_ATTEMPTS" || true
              fi

              if wait_for_state "RUNNING"; then
                echo "Server $SERVER_ID is online"
                WAS_ONLINE=false
                return 0
              fi
            done

            echo "::error title=Server Offline::CRITICAL: Server $SERVER_ID not verified online - CHECK MANUALLY"
            return 1
          }

          # Propagate restart failure as a non-zero exit so the job is
          # marked failed when the server is left offline (a green job
          # with only a console annotation would be easy to miss).
          on_exit() {
            local rc=$?
            restart_server || rc=$?
            echo "::endgroup::"
            exit "$rc"
          }
          trap on_exit EXIT

          # ── Authenticate ───────────────────────────────────────────────
          refresh_token || exit 1
          echo "Authenticated"

          # ── Resolve Disk Name ──────────────────────────────────────────
          # Required by the snapshot API when onlineSnapshot=false. Most
          # netcup vServers use "vda" but multi-disk or migrated servers
          # can differ - so query the authoritative source.
          DISKS_RESPONSE=$(api GET "/servers/$SERVER_ID/disks")
          DISK_NAME=$(echo "$DISKS_RESPONSE" | jq -r '.[0].name // empty')
          DISK_COUNT=$(echo "$DISKS_RESPONSE" | jq 'length')

          if [[ -z "$DISK_NAME" ]]; then
            echo "::error title=Disk Unknown::Could not determine disk name for server $SERVER_ID"
            exit 1
          fi

          if [[ "$DISK_COUNT" -gt 1 ]]; then
            echo "::warning::Server has $DISK_COUNT disks; only the first ($DISK_NAME) will be snapshotted"
          fi
          echo "Disk: $DISK_NAME"

          # ── Get Current Server State ───────────────────────────────────
          STATE=$(api GET "/servers/$SERVER_ID" | jq -r '.serverLiveInfo.state // empty')
          if [[ -z "$STATE" ]]; then
            echo "::error title=State Unknown::Could not determine server state for $SERVER_ID"
            exit 1
          fi
          echo "Current state: $STATE"

          # ── Skip if today's snapshot already exists ────────────────────
          # Hard-fail on listing errors - silently treating a transient
          # 5xx as "no existing snapshot" would cause needless downtime.
          SNAP_NAME="$(date -u +%Y%m%d)"
          SNAPSHOTS=$(api GET "/servers/$SERVER_ID/snapshots") || {
            echo "::error title=List Failed::Could not list snapshots for $SERVER_ID"
            exit 1
          }

          if echo "$SNAPSHOTS" | jq -e --arg name "$SNAP_NAME" 'any(.[]; .name == $name)' >/dev/null; then
            echo "Snapshot '$SNAP_NAME' already exists - skipping"
            exit 0
          fi

          # ── Stop Server if Online ──────────────────────────────────────
          # The REST API does NOT auto-shutdown for offline snapshots
          # (the SCP web UI does that orchestration on top of the API).
          # The snapshot endpoint returns "server is not in state shutoff"
          # if the server is anything other than SHUTOFF.
          if [[ "$STATE" != "SHUTOFF" ]]; then
            WAS_ONLINE=true
            echo "Stopping server..."

            TASK=$(api PATCH "/servers/$SERVER_ID" \
              -H "Content-Type: application/merge-patch+json" \
              -d '{"state":"OFF"}' | jq -r '.uuid // empty') || TASK=""

            if [[ -n "$TASK" ]]; then
              wait_task "$TASK" "$POLL_ATTEMPTS" || true
            fi

            if wait_for_state "SHUTOFF"; then
              echo "Server stopped"
            else
              echo "::error title=Stop Failed::Server $SERVER_ID did not reach SHUTOFF within timeout"
              exit 1
            fi
          fi

          # ── Create Snapshot ────────────────────────────────────────────
          echo "Creating snapshot: $SNAP_NAME (disk: $DISK_NAME)"

          # Build body with jq -n so disk name / snapshot name don't get
          # interpolated into raw JSON unsafely.
          SNAP_BODY=$(jq -nc \
            --arg name "$SNAP_NAME" \
            --arg disk "$DISK_NAME" \
            '{name: $name, description: "Weekly Backup", diskName: $disk, onlineSnapshot: false}')

          if ! SNAP_RESPONSE=$(api POST "/servers/$SERVER_ID/snapshots" \
            -H "Content-Type: application/json" \
            -d "$SNAP_BODY"); then
            echo "::error title=Snapshot Failed::Snapshot API call failed for server $SERVER_ID"
            exit 1
          fi

          TASK=$(echo "$SNAP_RESPONSE" | jq -r '.uuid // empty')
          if [[ -z "$TASK" ]]; then
            echo "::error title=Snapshot Failed::No task UUID in snapshot response"
            exit 1
          fi

          echo "Snapshot task: $TASK"

          if wait_task "$TASK" "$SNAPSHOT_POLL_ATTEMPTS"; then
            echo "Snapshot created: $SNAP_NAME"
          else
            echo "::error title=Snapshot Failed::Snapshot task did not complete for server $SERVER_ID"
            exit 1
          fi

          # ── Cleanup Old Snapshots (server still stopped) ───────────────
          cleanup_old_snapshots
