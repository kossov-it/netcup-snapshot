name: Weekly Snapshot

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Create weekly snapshot
        env:
          SCP_USER: ${{ secrets.SCP_USER }}
          SCP_PASS: ${{ secrets.SCP_PASS }}
          SERVER_ID: "652141"
        run: |
          set -e
          WEEK="kw$(date +%V)"
          
          TOKEN=$(curl -sf -X POST 'https://servercontrolpanel.de/realms/scp/protocol/openid-connect/token' \
            -d "client_id=scp&username=$SCP_USER&password=$SCP_PASS&grant_type=password" | jq -r '.access_token')
          
          API="https://www.servercontrolpanel.de/scp-core/api/v1/servers/$SERVER_ID"
          AUTH=(-H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json")
          
          STATE=$(curl -sf "${AUTH[@]}" "$API" | jq -r '.serverLiveInfo.state')
          echo "Current state: $STATE"
          
          if [ "$STATE" != "OFF" ] && [ "$STATE" != "SHUTOFF" ]; then
            echo "Stopping server..."
            curl -sf -X PATCH "${AUTH[@]}" -H "Content-Type: application/merge-patch+json" \
              "$API" -d '{"state":"OFF"}' > /dev/null
            
            for i in {1..30}; do
              sleep 10
              STATE=$(curl -sf "${AUTH[@]}" "$API" | jq -r '.serverLiveInfo.state')
              echo "State: $STATE"
              [ "$STATE" = "OFF" ] || [ "$STATE" = "SHUTOFF" ] && break
            done
          fi
          
          echo "Creating snapshot: $WEEK"
          curl -sf -X POST "${AUTH[@]}" -H "Content-Type: application/json" \
            "$API/snapshots" -d "{\"name\":\"$WEEK\",\"description\":\"Weekly backup\",\"onlineSnapshot\":false}"
          
          sleep 30
          
          echo "Starting server..."
          curl -sf -X PATCH "${AUTH[@]}" -H "Content-Type: application/merge-patch+json" \
            "$API" -d '{"state":"ON"}'
          
          echo "Done"
