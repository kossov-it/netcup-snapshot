name: Weekly Snapshot
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:                                                                                   
      fail-fast: false                                                                          
      matrix:
       server_id: ["652141", "826718", "829107"]
    steps:
      - name: Create offline snapshot
        env:
          SCP_USER: ${{ secrets.SCP_USER }}
          SCP_PASS: ${{ secrets.SCP_PASS }}
          SERVER_ID: ${{ matrix.server_id }}
        run: |
          set -euo pipefail
          API="https://www.servercontrolpanel.de/scp-core/api/v1"
          WAS_ONLINE=false
          
          TOKEN=$(curl -s -X POST 'https://servercontrolpanel.de/realms/scp/protocol/openid-connect/token' \
            -d "client_id=scp&username=$SCP_USER&password=$SCP_PASS&grant_type=password" | jq -r '.access_token')
          [[ -z "$TOKEN" || "$TOKEN" == "null" ]] && echo "✗ Auth failed" && exit 1
          echo "✓ Authenticated"
          
          auth() { echo "Authorization: Bearer $TOKEN"; }
          
          restart_server() {
            $WAS_ONLINE || return 0
            echo "→ Restarting server..."
            for attempt in {1..3}; do
              TASK=$(curl -s -X PATCH "$API/servers/$SERVER_ID" -H "$(auth)" \
                -H "Content-Type: application/merge-patch+json" -d '{"state":"ON"}' | jq -r '.uuid // empty')
              [[ -z "$TASK" ]] && sleep 5 && continue
              
              for i in {1..12}; do
                state=$(curl -s "$API/tasks/$TASK" -H "$(auth)" | jq -r '.state // empty')
                [[ "$state" == "FINISHED" ]] && break 2
                [[ "$state" == "FAILED" || "$state" == "CANCELLED" ]] && break
                sleep 5
              done
            done
            
            for i in {1..12}; do
              STATE=$(curl -s "$API/servers/$SERVER_ID" -H "$(auth)" | jq -r '.serverLiveInfo.state')
              [[ "$STATE" == "ACTIVE" || "$STATE" == "RUNNING" ]] && { echo "✓ Server online"; WAS_ONLINE=false; return 0; }
              sleep 5
            done
            echo "✗ CRITICAL: Server not verified online - CHECK MANUALLY"; return 1
          }
          trap 'restart_server || true' EXIT
          
          wait_task() {
            local uuid=$1 max=${2:-30}
            for ((i=1; i<=max; i++)); do
              state=$(curl -s "$API/tasks/$uuid" -H "$(auth)" | jq -r '.state // empty')
              case "$state" in
                FINISHED) return 0 ;;
                FAILED|CANCELLED|"") return 1 ;;
              esac
              sleep 5
            done
            return 1
          }
          
          STATE=$(curl -s "$API/servers/$SERVER_ID" -H "$(auth)" | jq -r '.serverLiveInfo.state')
          echo "Current state: $STATE"
          
          if [[ "$STATE" != "OFF" && "$STATE" != "SHUTOFF" ]]; then
            WAS_ONLINE=true
            echo "Stopping server..."
            TASK=$(curl -s -X PATCH "$API/servers/$SERVER_ID" -H "$(auth)" \
              -H "Content-Type: application/merge-patch+json" -d '{"state":"OFF"}' | jq -r '.uuid // empty')
            [[ -n "$TASK" ]] && wait_task "$TASK" 12 || true
            
            for i in {1..12}; do
              STATE=$(curl -s "$API/servers/$SERVER_ID" -H "$(auth)" | jq -r '.serverLiveInfo.state')
              [[ "$STATE" == "OFF" || "$STATE" == "SHUTOFF" ]] && { echo "✓ Server stopped"; break; }
              [[ $i -eq 12 ]] && echo "✗ Server did not stop" && exit 1
              sleep 5
            done
          fi
          
          SNAP="$(date -u +%Y%m%d)"
          echo "Creating snapshot: $SNAP"
          
          SNAP_RESPONSE=$(curl -s -X POST "$API/servers/$SERVER_ID/snapshots" -H "$(auth)" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$SNAP\",\"description\":\"Weekly Backup\",\"diskName\":\"vda\",\"onlineSnapshot\":false}")
          
          TASK=$(echo "$SNAP_RESPONSE" | jq -r '.uuid // empty')
          [[ -z "$TASK" ]] && echo "✗ Snapshot failed: $SNAP_RESPONSE" && exit 1
          
          echo "Snapshot task: $TASK"
          wait_task "$TASK" 30 && echo "✓ Snapshot created: $SNAP" || { echo "✗ Snapshot task failed"; exit 1; }
