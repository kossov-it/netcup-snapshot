name: Weekly Snapshot
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Create offline snapshot
        env:
          SCP_USER: ${{ secrets.SCP_USER }}
          SCP_PASS: ${{ secrets.SCP_PASS }}
          SERVER_ID: "652141"
        run: |
          set -euo pipefail
          API="https://www.servercontrolpanel.de/scp-core/api/v1"
          WAS_ONLINE=false
          TOKEN=""
          
          cleanup() {
            if $WAS_ONLINE && [[ -n "$TOKEN" ]]; then
              echo "⚠ Cleanup: restarting server..."
              for attempt in {1..5}; do
                if curl -s -X PATCH "$API/servers/$SERVER_ID" \
                  -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json" \
                  -H "Content-Type: application/merge-patch+json" -d '{"state":"ON"}' | grep -q uuid; then
                  echo "✓ Server start command sent"
                  return 0
                fi
                echo "Retry $attempt/5..."
                sleep 10
              done
              echo "✗ Failed to restart - CHECK SERVER MANUALLY"
            fi
          }
          trap cleanup EXIT
          
          api_call() {
            local response http_code body
            response=$(curl -s -w "\n%{http_code}" "$@")
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')
            if [[ "$http_code" -ge 400 ]]; then
              echo "API error (HTTP $http_code)" >&2
              return 1
            fi
            echo "$body"
          }
          
          wait_task() {
            local uuid=$1 max=${2:-60}
            for ((i=1; i<=max; i++)); do
              local task_response state
              task_response=$(api_call "$API/tasks/$uuid" \
                -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json") || return 1
              state=$(echo "$task_response" | jq -r '.state // empty')
              case "$state" in
                FINISHED) return 0 ;;
                FAILED|CANCELLED) 
                  echo "Task $state"
                  return 1 ;;
                "") echo "Invalid task response"; return 1 ;;
              esac
              sleep 10
            done
            echo "Task timeout after $((max * 10))s"; return 1
          }
          
          # Auth
          AUTH_RESPONSE=$(curl -s -X POST 'https://servercontrolpanel.de/realms/scp/protocol/openid-connect/token' \
            -d "client_id=scp&username=$SCP_USER&password=$SCP_PASS&grant_type=password")
          TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.access_token // empty')
          [[ -z "$TOKEN" ]] && echo "✗ Auth failed" && exit 1
          echo "✓ Authenticated"
          
          # Check server state
          SERVER_INFO=$(api_call "$API/servers/$SERVER_ID" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json")
          STATE=$(echo "$SERVER_INFO" | jq -r '.serverLiveInfo.state // empty')
          [[ -z "$STATE" ]] && echo "✗ Could not determine server state" && exit 1
          echo "Current state: $STATE"
          
          # Handle based on state
          if [[ "$STATE" == "OFF" || "$STATE" == "SHUTOFF" ]]; then
            echo "✓ Server already offline"
          else
            WAS_ONLINE=true
            echo "Stopping server..."
            
            STOP_RESPONSE=$(api_call -X PATCH "$API/servers/$SERVER_ID" \
              -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json" \
              -H "Content-Type: application/merge-patch+json" -d '{"state":"OFF"}')
            
            TASK=$(echo "$STOP_RESPONSE" | jq -r '.uuid // empty')
            [[ -n "$TASK" ]] && { wait_task "$TASK" 30 || true; }
            
            # Wait for offline state
            for i in {1..30}; do
              STATE=$(api_call "$API/servers/$SERVER_ID" \
                -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json" | jq -r '.serverLiveInfo.state // empty')
              if [[ "$STATE" == "OFF" || "$STATE" == "SHUTOFF" ]]; then
                echo "✓ Server stopped"
                break
              fi
              [[ $i -eq 30 ]] && echo "✗ Server did not stop in time" && exit 1
              sleep 10
            done
          fi
          
          # Create snapshot
          SNAP="$(date -u +%Y%m%d)"
          echo "Creating snapshot: $SNAP"
          
          SNAP_RESPONSE=$(api_call -X POST "$API/servers/$SERVER_ID/snapshots" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$SNAP\",\"description\":\"Weekly Backup\",\"diskName\":\"vda\",\"onlineSnapshot\":false}")
          
          TASK=$(echo "$SNAP_RESPONSE" | jq -r '.uuid // empty')
          [[ -z "$TASK" ]] && echo "✗ No task UUID in response" && exit 1
          
          echo "Snapshot task: $TASK"
          wait_task "$TASK" 180
          echo "✓ Snapshot created: $SNAP"
          
          # Restart if was online
          if $WAS_ONLINE; then
            api_call -X PATCH "$API/servers/$SERVER_ID" \
              -H "Authorization: Bearer $TOKEN" -H "Accept: application/hal+json" \
              -H "Content-Type: application/merge-patch+json" -d '{"state":"ON"}' >/dev/null
            WAS_ONLINE=false
            echo "✓ Server started"
          fi
